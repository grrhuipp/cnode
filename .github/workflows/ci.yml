name: CI

on:
  push:
    branches: [master, main]
    paths:
      - 'src/**'
      - 'include/**'
      - 'CMakeLists.txt'
      - 'vcpkg.json'
      - 'Dockerfile*'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'include/**'
      - 'CMakeLists.txt'
      - 'vcpkg.json'
      - 'Dockerfile*'
      - '.github/workflows/ci.yml'

env:
  VCPKG_ROOT: /root/vcpkg

jobs:
  build:
    name: ${{ matrix.build_type }} (musl static)
    runs-on: ubuntu-24.04
    container:
      image: alpine:3.20

    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]

    env:
      VCPKG_BINARY_SOURCES: "clear;files,/root/vcpkg-cache,readwrite"
      VCPKG_FORCE_SYSTEM_BINARIES: 1

    steps:
      - name: Install Alpine build tools
        run: |
          apk add --no-cache \
            build-base cmake samurai git curl \
            zip unzip tar pkgconf linux-headers musl-dev \
            perl bash python3 \
            autoconf automake libtool \
            go nasm \
            nodejs github-cli
          # samurai 是 ninja 的轻量替代，vcpkg/cmake 需要 ninja 命令
          ln -sf /usr/bin/samu /usr/bin/ninja

      - uses: actions/checkout@v4

      - name: Cache vcpkg tool
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_ROOT }}
          key: vcpkg-tool-alpine-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-tool-alpine-

      - name: Setup vcpkg
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: |
          rm -rf "$VCPKG_ROOT"
          git clone https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: /root/vcpkg-cache
          key: vcpkg-binary-alpine-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-binary-alpine-

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: build/vcpkg_installed
          key: vcpkg-installed-alpine-${{ matrix.build_type }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-installed-alpine-${{ matrix.build_type }}-
            vcpkg-installed-alpine-

      - name: Generate build ID
        id: buildid
        run: echo "id=$(od -An -tx1 -N6 /dev/urandom | tr -d ' \n')" >> "$GITHUB_OUTPUT"

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_EXE_LINKER_FLAGS="-static" \
            -DBUILD_ID=${{ steps.buildid.outputs.id }}

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Verify & strip binary
        run: |
          file build/cnode
          ldd build/cnode 2>&1 && echo "WARNING: not fully static" || echo "OK: fully static binary"
          if [ "${{ matrix.build_type }}" = "Release" ]; then
            strip build/cnode
          fi
          SUFFIX=$(echo "${{ matrix.build_type }}" | tr '[:upper:]' '[:lower:]')
          cp build/cnode "cnode-linux-amd64-${SUFFIX}"
          ls -lh "cnode-linux-amd64-${SUFFIX}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cnode-linux-x64-${{ matrix.build_type }}
          path: build/cnode
          if-no-files-found: error

      # 以下步骤仅 Release + push 时执行
      - name: Fix git safe directory (container ownership mismatch)
        if: github.event_name == 'push' && matrix.build_type == 'Release'
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Delete old release
        if: github.event_name == 'push' && matrix.build_type == 'Release'
        run: gh release delete "${{ github.ref_name }}" --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup old workflow runs
        if: github.event_name == 'push' && matrix.build_type == 'Release'
        run: |
          gh run list --branch "${{ github.ref_name }}" --json databaseId \
            --jq '.[].databaseId' \
          | while read -r rid; do
              [ "$rid" = "${{ github.run_id }}" ] && continue
              gh run delete "$rid" 2>/dev/null || true
            done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release
        if: github.event_name == 'push' && matrix.build_type == 'Release'
        run: |
          gh release create "${{ github.ref_name }}" cnode-linux-amd64-release \
            --title "${{ github.ref_name }}" \
            --notes "branch: ${{ github.ref_name }}, build_id: ${{ steps.buildid.outputs.id }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
