name: CI

on:
  push:
    branches: [master, main, 'v*']
    paths:
      - 'src/**'
      - 'include/**'
      - 'CMakeLists.txt'
      - 'vcpkg.json'
      - 'Dockerfile*'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'include/**'
      - 'CMakeLists.txt'
      - 'vcpkg.json'
      - 'Dockerfile*'
      - '.github/workflows/ci.yml'

env:
  VCPKG_ROOT: /root/vcpkg

jobs:
  release:
    name: Release (musl static)
    runs-on: ubuntu-24.04
    container:
      image: alpine:3.20

    permissions:
      contents: write

    env:
      VCPKG_BINARY_SOURCES: "clear;files,/root/vcpkg-cache,readwrite"
      VCPKG_FORCE_SYSTEM_BINARIES: 1

    steps:
      - name: Install Alpine build tools
        run: |
          apk add --no-cache \
            build-base cmake samurai git curl \
            zip unzip tar pkgconf linux-headers musl-dev \
            perl bash python3 \
            autoconf automake libtool \
            go nasm \
            nodejs github-cli
          # samurai 是 ninja 的轻量替代，vcpkg/cmake 需要 ninja 命令
          ln -sf /usr/bin/samu /usr/bin/ninja

      - uses: actions/checkout@v4

      - name: Cache vcpkg tool
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_ROOT }}
          key: vcpkg-tool-alpine-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-tool-alpine-

      - name: Setup vcpkg
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: |
          rm -rf "$VCPKG_ROOT"
          git clone https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: /root/vcpkg-cache
          key: vcpkg-binary-alpine-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-binary-alpine-

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: build/vcpkg_installed
          key: vcpkg-installed-alpine-Release-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-installed-alpine-Release-
            vcpkg-installed-alpine-

      - name: Generate build ID
        id: buildid
        run: echo "id=$(od -An -tx1 -N6 /dev/urandom | tr -d ' \n')" >> "$GITHUB_OUTPUT"

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_EXE_LINKER_FLAGS="-static" \
            -DBUILD_ID=${{ steps.buildid.outputs.id }}

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Verify static binary
        run: |
          file build/cnode
          ldd build/cnode 2>&1 && echo "WARNING: not fully static" || echo "OK: fully static binary"

      - name: Strip binary
        run: |
          strip build/cnode
          cp build/cnode cnode-linux-amd64
          ls -lh cnode-linux-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cnode-linux-x64
          path: build/cnode
          if-no-files-found: error

      - name: Delete old release
        if: github.event_name == 'push'
        run: gh release delete "${{ github.ref_name }}" --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup old workflow runs
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ github.ref_name }}';
            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch: branch,
                per_page: 100,
              }
            );
            const toDelete = runs
              .filter(r => r.id !== context.runId)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            for (const run of toDelete) {
              try {
                await github.rest.actions.deleteWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: run.id,
                });
                console.log(`Deleted run #${run.id} (${run.created_at})`);
              } catch (e) {
                console.log(`Skip ${run.id}: ${e.message}`);
              }
            }
            console.log(`Cleaned up ${toDelete.length} old runs for branch ${branch}`);

      - name: Publish release
        if: github.event_name == 'push'
        run: |
          gh release create "${{ github.ref_name }}" cnode-linux-amd64 \
            --title "${{ github.ref_name }}" \
            --notes "branch: ${{ github.ref_name }}, build_id: ${{ steps.buildid.outputs.id }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
