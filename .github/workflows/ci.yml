name: CI

on:
  push:
    branches: [master, main]
    paths:
      - 'src/**'
      - 'include/**'
      - 'CMakeLists.txt'
      - 'vcpkg.json'
      - 'Dockerfile*'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'include/**'
      - 'CMakeLists.txt'
      - 'vcpkg.json'
      - 'Dockerfile*'
      - '.github/workflows/ci.yml'

env:
  VCPKG_ROOT: /root/vcpkg
  BUILD_ID: ${{ github.run_id }}

jobs:
  build:
    name: ${{ matrix.build_type }} (musl static)
    runs-on: ubuntu-24.04
    container:
      image: alpine:3.20

    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]

    env:
      VCPKG_BINARY_SOURCES: "clear;files,/root/vcpkg-cache,readwrite"
      VCPKG_FORCE_SYSTEM_BINARIES: 1

    steps:
      - name: Install Alpine build tools
        run: |
          apk add --no-cache \
            build-base binutils cmake samurai git curl \
            zip unzip tar pkgconf linux-headers musl-dev \
            perl bash python3 \
            autoconf automake libtool \
            go nasm \
            nodejs
          # samurai 是 ninja 的轻量替代，vcpkg/cmake 需要 ninja 命令
          ln -sf /usr/bin/samu /usr/bin/ninja

      - uses: actions/checkout@v4

      - name: Cache vcpkg tool
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_ROOT }}
          key: vcpkg-tool-alpine-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-tool-alpine-

      - name: Setup vcpkg
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: |
          rm -rf "$VCPKG_ROOT"
          git clone https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: /root/vcpkg-cache
          key: vcpkg-binary-alpine-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-binary-alpine-

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: build/vcpkg_installed
          key: vcpkg-installed-alpine-${{ matrix.build_type }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-installed-alpine-${{ matrix.build_type }}-
            vcpkg-installed-alpine-

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_EXE_LINKER_FLAGS="-static" \
            -DBUILD_ID=${{ env.BUILD_ID }}

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Verify & package binary
        run: |
          file build/cnode
          ldd build/cnode 2>&1 && echo "WARNING: not fully static" || echo "OK: fully static binary"
          mkdir -p release-assets
          if [ "${{ matrix.build_type }}" = "Release" ]; then
            objcopy --only-keep-debug build/cnode build/cnode-linux-amd64.debug
            strip build/cnode
            objcopy --add-gnu-debuglink=build/cnode-linux-amd64.debug build/cnode
            cp build/cnode release-assets/cnode-linux-amd64
            cp build/cnode-linux-amd64.debug release-assets/cnode-linux-amd64.debug
          else
            cp build/cnode release-assets/cnode-linux-amd64-debug
          fi
          ls -lh release-assets

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cnode-release-assets-${{ matrix.build_type }}
          path: release-assets/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: cnode-release-assets-*
          merge-multiple: true

      - name: Remove old release
        run: gh release delete "${{ github.ref_name }}" --repo "${{ github.repository }}" --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release assets
        run: |
          gh release create "${{ github.ref_name }}" release-assets/* \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --notes "branch: ${{ github.ref_name }}, build_id: ${{ env.BUILD_ID }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
